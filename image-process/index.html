<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Process - 图片画布处理工具</title>
  <script src="/lib/tailwind.js"></script>
  <style>
    * {
      scrollbar-width: thin;
      scrollbar-color: #475569 #1e293b;
    }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
    *::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: #64748b; }

    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }

    /* ── 无限画布 ── */
    #canvas {
      position: absolute;
      top: 0; left: 0;
      min-width: 100%;
      min-height: 100%;
      background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #canvasViewport {
      position: fixed;
      top: 48px; left: 0; bottom: 0;
      right: 0;
      overflow: auto;
      transition: right 0.25s ease;
    }
    #canvasViewport.panel-open {
      right: 320px;
    }

    /* ── 图片卡片 ── */
    .img-card {
      position: absolute;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: visible;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      transition: box-shadow 0.15s;
      background: #1e293b;
      border: 2px solid transparent;
    }
    .img-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .img-card.selected {
      /* border-color: #3b82f6; */
      box-shadow: 0 0 0 2px rgba(59,130,246,.4), 0 8px 32px rgba(0,0,0,.5);
    }

    .card-titlebar {
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(30,41,59,.92);
      border-bottom: 1px solid #334155;
      border-radius: 8px 8px 0 0;
      gap: 6px;
      min-height: 36px;
    }
    .card-titlebar:active { cursor: grabbing; }

    .card-title {
      font-size: 13px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .card-body {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-conic-gradient(#1a1a2e 0% 25%, #0f172a 0% 50%) 0 0 / 16px 16px;
      border-radius: 0 0 8px 8px;
      cursor: grab;
    }
    .card-body:active { cursor: grabbing; }
    .card-body img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      user-select: none;
    }

    /* 四角 + 四边缩放手柄 */
    .resize-handle {
      position: absolute;
      z-index: 10;
    }
    .resize-handle.corner {
      width: 16px; height: 16px;
    }
    .resize-handle.edge {
      background: transparent;
    }
    .resize-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
    .resize-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
    .resize-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
    .resize-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
    .resize-handle.n  { top: -4px; left: 10px; right: 10px; height: 8px; cursor: n-resize; }
    .resize-handle.s  { bottom: -4px; left: 10px; right: 10px; height: 8px; cursor: s-resize; }
    .resize-handle.w  { left: -4px; top: 10px; bottom: 10px; width: 8px; cursor: w-resize; }
    .resize-handle.e  { right: -4px; top: 10px; bottom: 10px; width: 8px; cursor: e-resize; }

    .img-card:not(.selected) .resize-handle { display: none; }

    .card-btn {
      padding: 2px 6px; font-size: 11px; border-radius: 4px;
      border: 1px solid #475569; background: transparent;
      color: #94a3b8; cursor: pointer; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .card-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .card-btn.danger { border-color: #7f1d1d; color: #f87171; }
    .card-btn.danger:hover { background: #7f1d1d; color: #fff; }

    /* ── 顶部 Banner ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      z-index: 9999;
      background: rgba(15,23,42,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #1e293b;
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
    }
    #topBar h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; white-space: nowrap; }

    #imgIndex {
      display: flex; gap: 6px; align-items: center;
      overflow-x: auto; flex: 1; padding: 0 8px;
      scrollbar-width: none;
    }
    #imgIndex::-webkit-scrollbar { display: none; }

    .idx-chip {
      flex-shrink: 0;
      padding: 3px 10px; font-size: 12px; border-radius: 999px;
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
    }
    .idx-chip:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
    .idx-chip.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    #addImgBtn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 12px; font-size: 13px; font-weight: 500;
      background: #2563eb; color: #fff; border: none; border-radius: 6px;
      cursor: pointer; transition: background 0.15s;
    }
    #addImgBtn:hover { background: #1d4ed8; }

    /* ── 右侧信息面板 ── */
    #infoPanel {
      position: fixed;
      top: 48px; right: 0; bottom: 0;
      width: 320px;
      background: rgba(15,23,42,.96);
      backdrop-filter: blur(12px);
      border-left: 1px solid #1e293b;
      z-index: 9998;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    #infoPanel.open {
      transform: translateX(0);
    }

    .panel-section {
      padding: 16px;
      border-bottom: 1px solid #1e293b;
    }
    .panel-section:last-child { border-bottom: none; }

    .panel-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .panel-input {
      width: 100%;
      padding: 6px 10px;
      font-size: 13px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.15s;
    }
    .panel-input:focus { border-color: #3b82f6; }

    .panel-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .panel-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .panel-field label {
      font-size: 11px;
      color: #64748b;
    }

    .link-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; cursor: pointer;
      border: 1px solid #334155;
      color: #64748b;
      transition: all 0.15s;
      flex-shrink: 0;
      margin-top: 18px;
    }
    .link-icon:hover { border-color: #475569; color: #e2e8f0; }
    .link-icon.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .download-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .download-btn:hover { background: #1d4ed8; }

    .panel-close-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .panel-close-btn:hover { border-color: #64748b; color: #e2e8f0; }

    .panel-preview {
      width: 100%;
      aspect-ratio: 16/10;
      border-radius: 6px;
      overflow: hidden;
      background: repeating-conic-gradient(#1a1a2e 0% 25%, #0f172a 0% 50%) 0 0 / 12px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel-preview img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    /* quality slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
    }

    .format-option {
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .format-option:hover { border-color: #475569; color: #e2e8f0; }
    .format-option.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    /* ── 拖放提示 ── */
    .drop-overlay {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
      background: rgba(15,23,42,.85);
      z-index: 9990;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .drop-overlay.visible {
      display: flex;
    }
    .drop-overlay-inner {
      padding: 40px 60px;
      border: 3px dashed #3b82f6;
      border-radius: 16px;
      color: #7dd3fc;
      font-size: 20px;
      font-weight: 600;
    }

    /* Toast */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast { animation: fadeIn 0.2s ease-out; }

    .dim-display {
      font-size: 11px;
      color: #64748b;
      padding: 2px 6px;
      background: rgba(30,41,59,.6);
      border-radius: 4px;
    }

    /* ── 操作按钮 ── */
    .action-btn {
      flex: 1;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 500;
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .action-btn:hover {
      border-color: #475569;
      color: #e2e8f0;
      background: #1e293b;
    }

    /* ── 裁剪弹窗 ── */
    #cropModal {
      position: fixed;
      inset: 0;
      z-index: 100000;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
    }
    #cropModal.open { display: flex; }

    .crop-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 12px;
      width: min(92vw, 960px);
      height: min(88vh, 740px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }
    .crop-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .crop-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0;
    }
    #cropStage {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    #cropImg {
      position: absolute;
      user-select: none;
      pointer-events: none;
      display: block;
    }
    #cropSelection {
      position: absolute;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      cursor: move;
      z-index: 2;
    }
    /* Rule-of-thirds grid lines */
    #cropSelection::before,
    #cropSelection::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    #cropSelection::before {
      border-left:  1px solid rgba(255,255,255,.25);
      border-right: 1px solid rgba(255,255,255,.25);
      left: 33.33%; right: 33.33%; top: 0; bottom: 0;
    }
    #cropSelection::after {
      border-top:    1px solid rgba(255,255,255,.25);
      border-bottom: 1px solid rgba(255,255,255,.25);
      top: 33.33%; bottom: 33.33%; left: 0; right: 0;
    }
    .crop-handle {
      position: absolute;
      z-index: 3;
      background: #fff;
      border: 1px solid rgba(0,0,0,.25);
    }
    .crop-handle.corner { width: 10px; height: 10px; border-radius: 2px; }
    .crop-handle.nw { top: -5px; left: -5px; cursor: nw-resize; }
    .crop-handle.ne { top: -5px; right: -5px; cursor: ne-resize; }
    .crop-handle.sw { bottom: -5px; left: -5px; cursor: sw-resize; }
    .crop-handle.se { bottom: -5px; right: -5px; cursor: se-resize; }
    .crop-handle.edge { background: rgba(255,255,255,.85); }
    .crop-handle.n  { top: -3px; left: 25%; right: 25%; height: 6px; cursor: n-resize; }
    .crop-handle.s  { bottom: -3px; left: 25%; right: 25%; height: 6px; cursor: s-resize; }
    .crop-handle.w  { left: -3px; top: 25%; bottom: 25%; width: 6px; cursor: w-resize; }
    .crop-handle.e  { right: -3px; top: 25%; bottom: 25%; width: 6px; cursor: e-resize; }
    /* ── 裁剪工具栏 ── */
    .crop-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .ratio-btn {
      padding: 3px 10px;
      font-size: 12px;
      border-radius: 5px;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ratio-btn:hover { border-color: #475569; color: #e2e8f0; }
    .ratio-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .crop-footer {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid #1e293b;
      flex-shrink: 0;
      gap: 10px;
    }
    .crop-size-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .crop-size-inputs label {
      font-size: 12px;
      color: #64748b;
    }
    .crop-size-inputs span {
      font-size: 12px;
      color: #475569;
    }
    .crop-size-input {
      width: 70px;
      padding: 4px 8px;
      font-size: 13px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 5px;
      color: #e2e8f0;
      outline: none;
    }
    .crop-size-input:focus { border-color: #3b82f6; }
    .crop-apply-btn {
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 500;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .crop-apply-btn:hover { background: #1d4ed8; }
    .crop-cancel-btn {
      padding: 8px 16px;
      font-size: 14px;
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .crop-cancel-btn:hover { border-color: #475569; color: #e2e8f0; }

    /* ── 圆角控制 ── */
    .crop-radius-control {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }
    .crop-radius-control label {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
    }
    .crop-radius-control input[type="range"] {
      width: 90px;
    }
    .crop-radius-control span {
      font-size: 12px;
      color: #94a3b8;
      min-width: 30px;
      text-align: right;
    }
  </style>
</head>

<body>
  <!-- ── 顶部 Banner ── -->
  <div id="topBar">
    <h1>Image Process</h1>
    <div id="imgIndex"></div>
    <button id="addImgBtn">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
          clip-rule="evenodd" />
      </svg>
      添加图片
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
  </div>

  <!-- ── 画布视口 ── -->
  <div id="canvasViewport">
    <div id="canvas"></div>
  </div>

  <!-- ── 拖放提示 ── -->
  <div id="dropOverlay" class="drop-overlay">
    <div class="drop-overlay-inner">释放以添加图片</div>
  </div>

  <!-- ── 右侧信息面板 ── -->
  <div id="infoPanel">
    <button class="panel-close-btn" id="panelCloseBtn">✕</button>

    <div class="panel-section">
      <div class="panel-label">预览</div>
      <div class="panel-preview">
        <img id="panelPreview" src="" alt="preview">
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">图片信息</div>
      <div className="flex flex-col gap-2">
        <div style="font-size:13px;" className="flex justify-between">
          <span style="color:#64748b;" class="text-nowrap">文件名</span>
          <span id="panelFileName" style="color:#e2e8f0;" class="text-wrap break-all">-</span>
        </div>
        <div style="font-size:13px;" className="flex justify-between">
          <span style="color:#64748b;">原始尺寸</span>
          <span id="panelOrigSize" style="color:#e2e8f0;">-</span>
        </div>
        <div style="font-size:13px;" className="flex justify-between">
          <span style="color:#64748b;">文件大小</span>
          <span id="panelFileSize" style="color:#e2e8f0;">-</span>
        </div>
        <div style="font-size:13px;" className="flex justify-between">
          <span style="color:#64748b;">类型</span>
          <span id="panelMimeType" style="color:#e2e8f0;">-</span>
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">操作</div>
      <div style="display:flex; gap:8px;">
        <button class="action-btn" id="duplicateBtn">复制图片</button>
        <button class="action-btn" id="cropBtn">裁剪图片</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">导出尺寸</div>
      <div class="panel-row">
        <div class="panel-field">
          <label>宽度 (px)</label>
          <input type="number" class="panel-input" id="panelWidth" min="1" step="1">
        </div>
        <div class="link-icon active" id="lockAspect" title="锁定宽高比">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0110 0v4"></path>
          </svg>
        </div>
        <div class="panel-field">
          <label>高度 (px)</label>
          <input type="number" class="panel-input" id="panelHeight" min="1" step="1">
        </div>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-label">导出格式</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="format-option active" data-format="png">PNG</button>
        <button class="format-option" data-format="jpeg">JPEG</button>
        <button class="format-option" data-format="webp">WebP</button>
        <button class="format-option" data-format="ico">ICO</button>
      </div>
    </div>

    <div class="panel-section" id="qualitySection" style="display:none;">
      <div class="panel-label">质量 <span id="qualityValue" style="color:#e2e8f0;">92</span>%</div>
      <input type="range" id="qualitySlider" min="10" max="100" value="92" step="1">
    </div>

    <div class="panel-section">
      <button class="download-btn" id="downloadBtn">
        <span style="margin-right:6px;">⬇</span> 导出并下载
      </button>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast fixed bottom-6 right-6 z-[99999] px-4 py-3 rounded-lg shadow-lg hidden"
    style="background: #1e293b; border: 1px solid #334155;">
    <p id="toastMsg" class="text-sm"></p>
  </div>

  <script type="module" src="libs/app.js"></script>
</body>

</html>
