<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Cards · Note Flow</title>
  <script src="/lib/tailwind.js"></script>
  <style>
    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: #475569 #0f172a;
    }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }
    *::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: #64748b; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .flow-wrap {
      columns: 1;
      column-gap: 16px;
    }
    @media (min-width: 768px) {
      .flow-wrap { columns: 2; }
    }
    @media (min-width: 1200px) {
      .flow-wrap { columns: 3; }
    }
    .flow-card {
      break-inside: avoid;
      margin: 0 0 16px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .28);
      overflow: hidden;
    }
    .flow-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid #334155;
      background: rgba(30, 41, 59, .8);
    }
    .flow-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .flow-card-time {
      font-size: 11px;
      color: #94a3b8;
      flex-shrink: 0;
    }
    .flow-card-body {
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      line-height: 1.55;
      font-size: 13px;
      color: #cbd5e1;
      margin: 0;
    }
    .flow-card-body.is-collapsed {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 8;
      overflow: hidden;
    }
    .flow-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px 10px;
      border-top: 1px solid #334155;
      font-size: 11px;
      color: #94a3b8;
    }
    .flow-btn {
      border: 1px solid #475569;
      background: #1e293b;
      color: #cbd5e1;
      border-radius: 6px;
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
      transition: all .15s;
    }
    .flow-btn:hover:not(:disabled) {
      border-color: #64748b;
      color: #f8fafc;
      background: #334155;
    }
    .flow-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .flow-btn.primary {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }
    .flow-btn.primary:hover:not(:disabled) {
      background: #1e40af;
      border-color: #1e40af;
    }
    .flow-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #334155;
      border-radius: 999px;
      font-size: 11px;
      padding: 2px 8px;
      color: #94a3b8;
    }
    .flow-empty {
      border: 1px dashed #334155;
      border-radius: 12px;
      text-align: center;
      color: #94a3b8;
      padding: 40px 16px;
      background: rgba(30, 41, 59, .45);
    }
    .flow-input, .flow-select {
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
    }
    .flow-input:focus, .flow-select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb;
    }
    .flow-modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, .72);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .flow-modal-mask.open {
      display: flex;
    }
    .flow-modal {
      width: min(900px, 100%);
      max-height: 86vh;
      display: flex;
      flex-direction: column;
      border: 1px solid #334155;
      border-radius: 14px;
      background: #1e293b;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
      overflow: hidden;
    }
    .flow-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid #334155;
    }
    .flow-modal-content {
      margin: 0;
      padding: 14px;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.65;
      color: #e2e8f0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header class="sticky top-0 z-50 border-b border-slate-700/70 bg-slate-900/95 backdrop-blur-sm">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center gap-3 px-4 py-3">
      <a href="./" class="text-sm font-semibold text-slate-200 hover:text-blue-400">Text Cards</a>
      <span class="text-slate-600">/</span>
      <span class="text-sm font-medium text-slate-300">Note Flow</span>
      <div class="ml-auto flex flex-wrap items-center gap-2">
        <input id="searchInput" class="flow-input w-56" type="text" placeholder="搜索标题或内容">
        <select id="sortSelect" class="flow-select">
          <option value="updated-desc">最近更新</option>
          <option value="updated-asc">最早更新</option>
          <option value="created-desc">最近创建</option>
          <option value="created-asc">最早创建</option>
          <option value="title-asc">标题 A-Z</option>
        </select>
        <select id="sizeSelect" class="flow-select">
          <option value="6">6 / 页</option>
          <option value="12" selected>12 / 页</option>
          <option value="24">24 / 页</option>
          <option value="48">48 / 页</option>
        </select>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-4">
    <div class="mb-3 flex flex-wrap items-center gap-2 text-xs text-slate-400">
      <span id="countMeta" class="flow-pill">0 notes</span>
      <span class="flow-pill">只读管理视图</span>
      <span class="flow-pill">不改动原卡片尺寸和位置</span>
    </div>

    <div id="flowList" class="flow-wrap"></div>

    <div id="pager" class="mt-4 flex items-center justify-between rounded-lg border border-slate-700 bg-slate-800/60 px-3 py-2">
      <button id="prevBtn" class="flow-btn">上一页</button>
      <span id="pageMeta" class="text-xs text-slate-400">第 1 / 1 页</span>
      <button id="nextBtn" class="flow-btn">下一页</button>
    </div>
  </main>

  <div id="noteModalMask" class="flow-modal-mask">
    <section class="flow-modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="flow-modal-head">
        <div>
          <h2 id="modalTitle" class="text-sm font-semibold text-slate-100"></h2>
          <p id="modalMeta" class="mt-1 text-xs text-slate-400"></p>
        </div>
        <button id="modalCloseBtn" class="flow-btn">关闭</button>
      </div>
      <pre id="modalContent" class="flow-modal-content"></pre>
    </section>
  </div>

  <script src="js/card-storage.js"></script>
  <script>
    const state = {
      panes: [],
      filtered: [],
      expandedIds: new Set(),
      search: '',
      sort: 'updated-desc',
      pageSize: 12,
      page: 1,
    };

    function toText(value) {
      return typeof value === 'string' ? value : '';
    }

    function formatTime(ts) {
      if (!Number.isFinite(ts)) return '-';
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString();
    }

    function applyFiltersAndSort() {
      const query = state.search.trim().toLowerCase();
      const source = state.panes.filter((pane) => {
        if (!query) return true;
        const title = toText(pane.title).toLowerCase();
        const content = toText(pane.content).toLowerCase();
        return title.includes(query) || content.includes(query);
      });

      source.sort((a, b) => {
        switch (state.sort) {
          case 'updated-asc':
            return (a.updatedAt || 0) - (b.updatedAt || 0);
          case 'created-desc':
            return (b.createdAt || 0) - (a.createdAt || 0);
          case 'created-asc':
            return (a.createdAt || 0) - (b.createdAt || 0);
          case 'title-asc':
            return toText(a.title).localeCompare(toText(b.title), 'zh');
          case 'updated-desc':
          default:
            return (b.updatedAt || 0) - (a.updatedAt || 0);
        }
      });

      state.filtered = source;
      const maxPage = Math.max(1, Math.ceil(source.length / state.pageSize));
      state.page = Math.min(state.page, maxPage);
    }

    function buildCardElement(pane) {
      const article = document.createElement('article');
      article.className = 'flow-card';
      article.dataset.id = pane.id;

      const title = toText(pane.title).trim() || 'Untitled';
      const content = toText(pane.content);
      const showExpand = content.length > 240 || (content.match(/\n/g) || []).length > 8;
      const isExpanded = state.expandedIds.has(pane.id);

      const createdAt = formatTime(pane.createdAt);
      const updatedAt = formatTime(pane.updatedAt);

      article.innerHTML = `
        <header class="flow-card-head">
          <h3 class="flow-card-title" title="${escapeHtml(title)}">${escapeHtml(title)}</h3>
          <span class="flow-card-time">${escapeHtml(updatedAt)}</span>
        </header>
        <pre class="flow-card-body${isExpanded ? '' : ' is-collapsed'}">${escapeHtml(content || '(empty)')}</pre>
        <footer class="flow-card-foot">
          <span>创建: ${escapeHtml(createdAt)}</span>
          <div class="flex items-center gap-2">
            ${showExpand ? '<button class="flow-btn js-toggle">展开</button>' : ''}
            <button class="flow-btn primary js-open">详情</button>
          </div>
        </footer>
      `;

      if (showExpand) {
        const toggleBtn = article.querySelector('.js-toggle');
        toggleBtn.textContent = isExpanded ? '收起' : '展开';
        toggleBtn.addEventListener('click', (event) => {
          event.stopPropagation();
          if (state.expandedIds.has(pane.id)) {
            state.expandedIds.delete(pane.id);
          } else {
            state.expandedIds.add(pane.id);
          }
          render();
        });
      }

      article.querySelector('.js-open').addEventListener('click', (event) => {
        event.stopPropagation();
        openModal(pane);
      });

      article.addEventListener('dblclick', () => openModal(pane));
      return article;
    }

    function render() {
      applyFiltersAndSort();
      const list = document.getElementById('flowList');
      const countMeta = document.getElementById('countMeta');
      const pageMeta = document.getElementById('pageMeta');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      list.innerHTML = '';
      const total = state.filtered.length;
      const maxPage = Math.max(1, Math.ceil(total / state.pageSize));
      const start = (state.page - 1) * state.pageSize;
      const pageItems = state.filtered.slice(start, start + state.pageSize);

      countMeta.textContent = `${total} notes`;
      pageMeta.textContent = `第 ${state.page} / ${maxPage} 页`;
      prevBtn.disabled = state.page <= 1;
      nextBtn.disabled = state.page >= maxPage;

      if (!pageItems.length) {
        const empty = document.createElement('div');
        empty.className = 'flow-empty';
        empty.textContent = total ? '这一页没有内容' : '暂无笔记数据';
        list.appendChild(empty);
        return;
      }

      pageItems.forEach((pane) => {
        list.appendChild(buildCardElement(pane));
      });
    }

    function openModal(pane) {
      document.getElementById('modalTitle').textContent = toText(pane.title).trim() || 'Untitled';
      document.getElementById('modalMeta').textContent = `创建: ${formatTime(pane.createdAt)} | 更新: ${formatTime(pane.updatedAt)}`;
      document.getElementById('modalContent').textContent = toText(pane.content);
      document.getElementById('noteModalMask').classList.add('open');
    }

    function closeModal() {
      document.getElementById('noteModalMask').classList.remove('open');
    }

    function escapeHtml(raw) {
      const str = raw == null ? '' : String(raw);
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function init() {
      const panes = await JsonVStorage.loadAll();
      state.panes = panes.map((item) => ({ ...item }));
      render();
    }

    document.getElementById('searchInput').addEventListener('input', (event) => {
      state.search = event.target.value;
      state.page = 1;
      render();
    });

    document.getElementById('sortSelect').addEventListener('change', (event) => {
      state.sort = event.target.value;
      state.page = 1;
      render();
    });

    document.getElementById('sizeSelect').addEventListener('change', (event) => {
      state.pageSize = Number(event.target.value) || 12;
      state.page = 1;
      render();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (state.page <= 1) return;
      state.page -= 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const maxPage = Math.max(1, Math.ceil(state.filtered.length / state.pageSize));
      if (state.page >= maxPage) return;
      state.page += 1;
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('noteModalMask').addEventListener('click', (event) => {
      if (event.target.id === 'noteModalMask') closeModal();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });

    init();
  </script>
</body>
</html>
