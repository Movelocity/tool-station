<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片笔记 - Text Cards</title>
  <script src="/lib/tailwind.js"></script>
  <!-- <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"> -->
  <link href="/lib/fonts-fira.css" rel="stylesheet">
  <style>
    * {
      scrollbar-width: thin;
      scrollbar-color: #475569 #1e293b;
    }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
    *::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: #64748b; }

    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }

    .code-font { font-family: 'Fira Code', 'Consolas', monospace; }

    /* JSON 语法颜色 */
    .json-key     { color: #7dd3fc; }
    .json-string  { color: #86efac; }
    .json-number  { color: #fcd34d; }
    .json-boolean { color: #c4b5fd; }
    .json-null    { color: #f87171; }

    /* Shell 语法颜色 */
    .sh-comment  { color: #64748b; font-style: italic; }
    .sh-string   { color: #86efac; }
    .sh-var      { color: #fcd34d; }
    .sh-keyword  { color: #c4b5fd; font-weight: 600; }

    /* Markdown 语法颜色 */
    .md-h1, .md-h2, .md-h3, .md-h4, .md-h5, .md-h6 { color: #7dd3fc; font-weight: 700; }
    .md-h1 { font-size: 1.2em; }
    .md-bold       { color: #f1f5f9; font-weight: 650; }
    .md-italic     { color: #e2e8f0; font-style: italic; }
    .md-code       { color: #fcd34d; background: rgba(255,255,255,.07); border-radius: 3px; }
    .md-blockquote { color: #94a3b8; border-left: 3px solid #475569; padding-left: 8px; }
    .md-bullet     { color: #c4b5fd; }
    .md-strike     { color: #64748b; text-decoration: line-through; }
    .md-link-text  { color: #7dd3fc; }
    .md-url        { color: #86efac; }
    .md-hr         { color: #475569; }

    /* hl-select 下拉 */
    .hl-select {
      padding: 2px 4px; font-size: 12px; border-radius: 4px;
      border: 1px solid #475569; background: #1e293b;
      color: #94a3b8; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .hl-select:hover { border-color: #64748b; color: #e2e8f0; }
    /* .hl-select.active { background: #1e3a5f; border-color: #2563eb; color: #7dd3fc; } */

    /* 自定义高亮模式下拉菜单 */
    #hlDropdown {
      position: fixed; z-index: 999999;
      background: #1e293b; border: 1px solid #475569; border-radius: 4px;
      padding: 2px 0; min-width: 80px;
      box-shadow: 0 4px 12px rgba(0,0,0,.4);
      display: none;
    }
    .hl-drop-item {
      padding: 4px 10px; font-size: 12px; cursor: pointer;
      color: #94a3b8; white-space: nowrap; transition: background 0.1s;
    }
    .hl-drop-item:hover { background: #334155; color: #e2e8f0; }
    .hl-drop-item.selected { color: #7dd3fc; }

    /* ── 无限画布 ── */
    #canvas {
      position: absolute;
      top: 0; left: 0;
      min-width: 100%;
      min-height: 100%;
      /* 点阵网格背景 */
      background-image: radial-gradient(circle, #1e293b 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #canvasViewport {
      position: fixed;
      top: 48px; left: 0; right: 0; bottom: 0;
      overflow: auto;
    }

    /* ── 窗格 ── */
    .json-pane {
      position: absolute;
      width: 560px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
      transition: box-shadow 0.15s;
    }
    .json-pane:hover,
    .json-pane:focus-within {
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    .pane-titlebar {
      cursor: grab;
      user-select: none;
    }
    .pane-titlebar:active { cursor: grabbing; }

    .pane-title-input[readonly] {
      pointer-events: none;
      cursor: grab;
      opacity: .85;
    }
    .pane-title-input:not([readonly]) {
      background: #1e293b;
      cursor: text;
      pointer-events: auto;
    }

    /* 高亮模式由每个窗格自身的 class 控制 */
    .pane-highlight-on .editor-textarea { display: none; }
    .pane-highlight-on .highlight-view  { display: block; }
    .highlight-view { display: none; }

    .pane-content { min-height: 120px; }
    .pane-highlight-on { overflow: auto; }

    .editor-textarea {
      width: 100%; height: 100%; min-height: 120px;
      background: transparent; color: #e2e8f0;
      border: none; outline: none; resize: none;
      font-family: consolas monospace;
      font-size: 15px; line-height: 1.6; padding: 12px;
      white-space: pre-wrap; overflow-wrap: break-word;
    }
    .pane-nowrap .editor-textarea,
    .pane-nowrap .highlight-view {
      white-space: pre; overflow-wrap: normal;
    }
    .editor-textarea::placeholder { color: #64748b; }

    .resize-handle {
      height: 6px; cursor: ns-resize;
      background: transparent; transition: background 0.15s;
      flex-shrink: 0;
    }
    .resize-handle:hover, .resize-handle.active { background: #3b82f6; }

    /* 窗格标题栏按钮 */
    .pane-btn {
      padding: 2px 8px; font-size: 12px; border-radius: 4px;
      border: 1px solid #475569; background: transparent;
      color: #94a3b8; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .pane-btn:hover { border-color: #64748b; color: #e2e8f0; }
    .pane-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
    .pane-btn.danger { border-color: #7f1d1d; color: #f87171; }
    .pane-btn.danger:hover { background: #7f1d1d; color: #fff; }
    .pane-btn.format-btn { border-color: #047857; color: #34d399; }
    .pane-btn.format-btn:hover { background: #047857; color: #fff; }

    /* ── 顶部 Banner ── */
    #topBar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px;
      z-index: 9999;
      background: rgba(15,23,42,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #1e293b;
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    #topBar.drag-minimize-ready {
      background: rgba(37,99,235,.35);
      border-bottom-color: #2563eb;
    }
    #topBar h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; white-space: nowrap; }

    #paneIndex {
      display: flex; gap: 6px; align-items: center;
      overflow-x: auto; flex: 1; padding: 0 8px;
      scrollbar-width: none;
    }
    #paneIndex::-webkit-scrollbar { display: none; }

    .idx-chip {
      flex-shrink: 0;
      padding: 3px 10px; font-size: 12px; border-radius: 999px;
      background: #1e293b; color: #94a3b8; border: 1px solid #334155;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
      max-width: 140px; overflow: hidden; text-overflow: ellipsis;
    }
    .idx-chip:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
    .idx-chip.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .idx-chip.minimized { border-style: dashed; color: #64748b; }
    .idx-chip.minimized:hover { color: #e2e8f0; }
    .idx-chip.maximized { border-color: #f59e0b; box-shadow: inset 0 0 0 1px #f59e0b; color: #fcd34d; }
    .idx-chip.maximized.active { background: #d97706; border-color: #d97706; color: #fff; box-shadow: none; }

    .json-pane.pane-minimized { display: none; }
    .json-pane.pane-maximized {
      position: fixed !important;
      top: 56px !important;
      left: 12px !important;
      width: calc(100vw - 24px) !important;
      height: calc(100vh - 68px) !important;
      max-height: calc(100vh - 68px);
      z-index: 1000000 !important;
    }
    .json-pane.pane-maximized .pane-content {
      min-height: 0;
      height: auto !important;
      flex: 1;
    }
    .json-pane.pane-maximized .minimize-pane-btn { display: none; }
    .json-pane.pane-maximized .resize-handle { display: none; }
    .pane-max-shadow {
      position: absolute;
      border: 1px dashed #475569;
      border-radius: 8px;
      background: rgba(51, 65, 85, 0.2);
      pointer-events: none;
    }

    #addPaneBtn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      padding: 4px 12px; font-size: 13px; font-weight: 500;
      background: #2563eb; color: #fff; border: none; border-radius: 6px;
      cursor: pointer; transition: background 0.15s;
    }
    #addPaneBtn:hover { background: #1d4ed8; }

    /* Toast */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast { animation: fadeIn 0.2s ease-out; }

    /* ── 数据导入导出浮动按钮 ── */
    #dataFabWrap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 1000010;
    }
    #dataFabBtn {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      transition: all 0.15s;
    }
    #dataFabBtn:hover { background: #334155; border-color: #475569; }
    #dataFabMenu {
      position: absolute;
      right: 0;
      bottom: 56px;
      display: none;
      min-width: 120px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .4);
    }
    #dataFabMenu.open { display: block; }
    .data-fab-item {
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      color: #cbd5e1;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .data-fab-item:hover { background: #334155; color: #f1f5f9; }
  </style>
</head>

<body>
  <!-- ── 顶部 Banner ── -->
  <div id="topBar">
    <a href="/" class="font-semibold text-slate-100 hover:text-green-400 transition-colors tracking-tight cursor-pointer">Text Cards</a>
    <div id="paneIndex"></div>
    <button id="addPaneBtn">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
          d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
          clip-rule="evenodd" />
      </svg>
      添加
    </button>
  </div>

  <!-- ── 画布视口 ── -->
  <div id="canvasViewport">
    <div id="canvas"></div>
  </div>

  <!-- 高亮模式自定义下拉 -->
  <div id="hlDropdown">
    <div class="hl-drop-item" data-value="">Raw</div>
    <div class="hl-drop-item" data-value="json">JSON</div>
    <div class="hl-drop-item" data-value="shell">Shell</div>
    <div class="hl-drop-item" data-value="markdown">MD</div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" class="toast fixed bottom-6 right-6 z-[99999] px-4 py-3 rounded-lg shadow-lg hidden"
    style="background: #1e293b; border: 1px solid #334155;">
    <p id="toastMsg" class="text-sm"></p>
  </div>

  <!-- 数据浮动按钮 -->
  <div id="dataFabWrap">
    <button id="dataFabBtn" title="数据操作">⋯</button>
    <div id="dataFabMenu">
      <button id="exportDataBtn" class="data-fab-item">导出 JSON</button>
      <button id="importDataBtn" class="data-fab-item">导入 JSON</button>
    </div>
    <input id="importFileInput" type="file" accept="application/json,.json" class="hidden">
  </div>

  <!-- 外部模块 -->
  <script src="js/json-v-storage.js"></script>
  <script src="js/json-v-highlight.js"></script>
  <script src="js/json-v-resize.js"></script>
  <script src="js/json-v-drag.js"></script>

  <script>
    // ── 常量 & 状态 ──
    const DEFAULT_WIDTH = 560;
    const DEFAULT_HEIGHT = 280;
    const PANE_GAP = 40;
    const EXPORT_VERSION = 1;
    let paneIdSeq = 0;
    let maximizedPaneId = null;
    // 每个窗格的选区信息  paneId → { textarea, start, end, text }
    const paneSelections = {};

    function debounce(fn, ms) {
      let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }

    // ── 高亮模式自定义下拉 ──
    let _hlDropdownCallback = null;
    let _hlDropdownBtn = null;

    function openHlDropdown(btn, currentMode, onSelect) {
      const dropdown = document.getElementById('hlDropdown');
      _hlDropdownBtn = btn;
      _hlDropdownCallback = onSelect;
      const rect = btn.getBoundingClientRect();
      dropdown.style.left = rect.left + 'px';
      dropdown.style.top  = (rect.bottom + 2) + 'px';
      dropdown.querySelectorAll('.hl-drop-item').forEach(item => {
        item.classList.toggle('selected', item.dataset.value === currentMode);
      });
      dropdown.style.display = 'block';
    }

    function closeHlDropdown() {
      document.getElementById('hlDropdown').style.display = 'none';
      _hlDropdownBtn = null;
      _hlDropdownCallback = null;
    }

    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('hlDropdown');
      if (!dropdown) return;
      const item = e.target.closest('.hl-drop-item');
      if (item && dropdown.contains(item)) {
        if (_hlDropdownCallback) _hlDropdownCallback(item.dataset.value);
        closeHlDropdown();
        return;
      }
      if (e.target !== _hlDropdownBtn && !dropdown.contains(e.target)) {
        closeHlDropdown();
      }
    });

    // ── 初始化 ──
    document.addEventListener('DOMContentLoaded', async () => {
      setupGlobalListeners();
      const saved = await JsonVStorage.loadAll();
      if (saved.length) {
        // 按 zIndex 升序创建，这样最后创建的在最上层
        saved.sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0));
        saved.forEach(s => {
          JsonVDrag.setBaseZ(s.zIndex || 0);
          createPane(s);
        });
      } else {
        createPane();
      }
      refreshIndex();
    });

    // ── 计算新窗格默认位置（瀑布式错开） ──
    function nextPosition() {
      const existing = document.querySelectorAll('.json-pane');
      const count = existing.length;
      const vp = document.getElementById('canvasViewport');
      const scrollX = vp.scrollLeft;
      const scrollY = vp.scrollTop;
      const vpW = vp.clientWidth;
      // 在可见区域中间偏左放置，每个新窗格向右下偏移
      const baseX = scrollX + Math.max(40, (vpW - DEFAULT_WIDTH) / 2 - 100);
      const baseY = scrollY + 40;
      const offset = (count % 8) * PANE_GAP;
      return { x: baseX + offset, y: baseY + offset };
    }

    // ── 创建窗格 ──
    function createPane(data) {
      paneIdSeq++;
      const id    = data?.id          || `pane-${Date.now()}-${paneIdSeq}`;
      const title = data?.title       || `Pane ${paneIdSeq}`;
      const content     = data?.content     || '';
      const hlMode      = data?.hlMode || (data?.highlightOn ? 'json' : '');
      const minimized   = data?.minimized   || false;
      const wordWrap    = data?.wordWrap !== false;   // 默认开启换行
      const createdAt   = Number.isFinite(data?.createdAt) ? data.createdAt : (Number.isFinite(data?.updatedAt) ? data.updatedAt : Date.now());
      const updatedAt   = Number.isFinite(data?.updatedAt) ? data.updatedAt : createdAt;
      const height = data?.height || DEFAULT_HEIGHT;
      const width  = data?.width  || DEFAULT_WIDTH;
      const pos    = (data?.x != null && data?.y != null) ? { x: data.x, y: data.y } : nextPosition();
      const zIdx   = data?.zIndex || 0;

      const pane = document.createElement('div');
      pane.dataset.paneId = id;
      pane.className = 'json-pane bg-slate-800 border border-slate-700';
      pane.dataset.createdAt = String(createdAt);
      pane.dataset.updatedAt = String(updatedAt);
      pane.style.left = pos.x + 'px';
      pane.style.top  = pos.y + 'px';
      pane.style.width = width + 'px';
      if (zIdx) pane.style.zIndex = zIdx;

      pane.innerHTML = `
        <div class="pane-titlebar flex items-center justify-between px-3 py-2 bg-slate-800/80 border-b border-slate-700 gap-2">
          <input type="text" class="pane-title-input bg-transparent text-slate-200 text-sm font-medium focus:outline-none focus:ring-1 focus:ring-blue-500 rounded px-1 py-0.5 min-w-0 flex-1" value="${esc(title)}" placeholder="标题..." readonly>
          <div class="flex items-center gap-1 flex-shrink-0">
            <span class="pane-created-at text-[11px] text-slate-500 px-1 hidden sm:inline" title="创建时间">${formatTimestamp(createdAt)}</span>
            <button class="pane-btn format-btn hidden" title="格式化选中 JSON">格式化</button>
            <button class="hl-select${hlMode ? ' active' : ''}" title="选择高亮模式" data-hl-mode="${hlMode}">${hlMode === 'json' ? 'JSON' : hlMode === 'shell' ? 'Shell' : hlMode === 'markdown' ? 'MD' : 'Raw'}</button>
            <button class="pane-btn wrap-toggle active" title="切换自动换行">↵</button>
            <button class="maximize-pane-btn pane-btn" title="最大化">□</button>
            <button class="minimize-pane-btn pane-btn" title="最小化">−</button>
            <button class="delete-pane-btn pane-btn danger" title="删除窗格">✕</button>
          </div>
        </div>
        <div class="pane-content relative" style="height:${height}px">
          <textarea class="editor-textarea code-font" placeholder="在此粘贴文本 / JSON …">${JsonVHighlight.escapeHtml(content)}</textarea>
          <div class="highlight-view code-font text-sm p-3 whitespace-pre-wrap break-all"></div>
        </div>
        <div class="resize-handle"></div>
      `;

      document.getElementById('canvas').appendChild(pane);

      // ── 查询子元素 ──
      const titleBar     = pane.querySelector('.pane-titlebar');
      const titleInput   = pane.querySelector('.pane-title-input');
      const textarea     = pane.querySelector('.editor-textarea');
      const hlSelect     = pane.querySelector('.hl-select');
      const wrapToggle   = pane.querySelector('.wrap-toggle');
      const formatBtn    = pane.querySelector('.format-btn');
      const minimizeBtn  = pane.querySelector('.minimize-pane-btn');
      const maximizeBtn  = pane.querySelector('.maximize-pane-btn');
      const deleteBtn    = pane.querySelector('.delete-pane-btn');
      const paneContent  = pane.querySelector('.pane-content');
      const resizeHandle = pane.querySelector('.resize-handle');

      if (hlMode) {
        pane.dataset.hlMode = hlMode;
        paneContent.classList.add('pane-highlight-on');
        refreshHighlight(pane);
      }
      if (minimized) {
        pane.classList.add('pane-minimized');
      }
      if (!wordWrap) {
        paneContent.classList.add('pane-nowrap');
        wrapToggle.classList.remove('active');
      }

      // ── 标题双击编辑 ──
      titleBar.addEventListener('dblclick', (e) => {
        const rect = titleInput.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right ||
            e.clientY < rect.top  || e.clientY > rect.bottom) return;
        enterTitleEdit();
      });

      // ── 拖拽移动 ──
      const drag = JsonVDrag.attach(pane, titleBar, {
        canvas: document.getElementById('canvas'),
        onMoved: () => scheduleSave(pane),
        onFocus: () => { setActiveChip(id); scheduleSave(pane); },
        onMinimize: () => {
          pane.classList.add('pane-minimized');
          scheduleSave(pane);
          refreshIndex();
        },
      });

      // ── 拖拽调整高度 ──
      JsonVResize.attach(resizeHandle, paneContent, {
        minHeight: 120,
        onEnd: () => scheduleSave(pane),
      });

      // ── 标题编辑开关 ──
      const debouncedSave = debounce(() => scheduleSave(pane), 600);

      function enterTitleEdit() {
        titleInput.removeAttribute('readonly');
        titleInput.focus();
        titleInput.select();
      }
      function exitTitleEdit() {
        titleInput.setAttribute('readonly', '');
      }

      titleInput.addEventListener('blur', () => { exitTitleEdit(); });
      titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === 'Escape') { exitTitleEdit(); e.preventDefault(); }
      });
      titleInput.addEventListener('input', () => { debouncedSave(); refreshIndex(); });

      // ── 换行开关 ──
      wrapToggle.addEventListener('click', () => {
        const nowrap = paneContent.classList.toggle('pane-nowrap');
        wrapToggle.classList.toggle('active', !nowrap);
        scheduleSave(pane);
      });

      // ── 高亮模式 ──
      hlSelect.addEventListener('click', (e) => {
        e.stopPropagation();
        openHlDropdown(hlSelect, hlSelect.dataset.hlMode, (mode) => {
          hlSelect.dataset.hlMode = mode;
          hlSelect.textContent = mode === 'json' ? 'JSON' : mode === 'shell' ? 'Shell' : mode === 'markdown' ? 'MD' : 'Raw';
          pane.dataset.hlMode = mode;
          hlSelect.classList.toggle('active', !!mode);
          if (mode) {
            paneContent.classList.add('pane-highlight-on');
            refreshHighlight(pane);
          } else {
            paneContent.classList.remove('pane-highlight-on');
          }
          scheduleSave(pane);
        });
      });

      // ── 格式化按钮 ──
      // formatBtn.addEventListener('click', () => {
      //   const sel = paneSelections[id];
      //   if (!sel) return;
      //   try {
      //     const formatted = JSON.stringify(JSON.parse(sel.text), null, 2);
      //     textarea.value = textarea.value.substring(0, sel.start) + formatted + textarea.value.substring(sel.end);
      //     textarea.focus();
      //     textarea.setSelectionRange(sel.start, sel.start + formatted.length);
      //     paneSelections[id] = null;
      //     formatBtn.classList.add('hidden');
      //     if (paneContent.classList.contains('pane-highlight-on')) refreshHighlight(pane);
      //     scheduleSave(pane);
      //     showToast('JSON 格式化成功', 'success');
      //   } catch (err) {
      //     showToast('无效的 JSON: ' + err.message, 'error');
      //   }
      // });

      // ── 文本选择 → 显示/隐藏格式化按钮 ──
      // function checkSelection() {
      //   const s = textarea.selectionStart;
      //   const e = textarea.selectionEnd;
      //   const text = textarea.value.substring(s, e);
      //   if (text.trim().length > 0) {
      //     paneSelections[id] = { textarea, start: s, end: e, text };
      //     formatBtn.classList.remove('hidden');
      //   } else {
      //     paneSelections[id] = null;
      //     formatBtn.classList.add('hidden');
      //   }
      // }
      // textarea.addEventListener('select', checkSelection);
      // textarea.addEventListener('mouseup', checkSelection);
      // textarea.addEventListener('keyup', checkSelection);
      // textarea.addEventListener('blur', () => {
      //   setTimeout(() => {
      //     if (document.activeElement !== formatBtn) {
      //       formatBtn.classList.add('hidden');
      //     }
      //   }, 150);
      // });

      // ── 内容变化保存 ──
      textarea.addEventListener('input', debouncedSave);

      // ── 最小化 ──
      minimizeBtn.addEventListener('click', () => {
        pane.classList.add('pane-minimized');
        if (maximizedPaneId === id) exitMaxMode();
        scheduleSave(pane);
        refreshIndex();
      });

      // ── 最大化 ──
      maximizeBtn.addEventListener('click', () => {
        toggleMaxMode(id);
      });

      // ── 删除 ──
      deleteBtn.addEventListener('click', async () => {
        if (document.querySelectorAll('.json-pane').length > 1) {
          const contentText = pane.querySelector('.editor-textarea').value || '';
          if (contentText.trim()) {
            const title = pane.querySelector('.pane-title-input').value || '';
            const briefContent = contentText.substring(0, 36) + '...';
            const confirmed = window.confirm(`卡片【${title}】不为空，确认删除吗？\n\n${briefContent}`);
            if (!confirmed) return;
          }
          if (maximizedPaneId === id) exitMaxMode();
          pane.remove();
          delete paneSelections[id];
          await JsonVStorage.removePane(id);
          refreshIndex();
        } else {
          showToast('至少保留一个窗格', 'error');
        }
      });

      // 新窗格立即置顶
      JsonVDrag.bringToFront(pane);
      if (!data) scheduleSave(pane);
      refreshIndex();
      setActiveChip(id);
    }

    // ── 辅助 ──
    function esc(s) { return JsonVHighlight.escapeHtml(s).replace(/"/g, '&quot;'); }

    function formatTimestamp(ts) {
      if (!ts) return '';
      const date = new Date(ts);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString();
    }

    function removeMaxShadow() {
      document.querySelectorAll('.pane-max-shadow').forEach(el => el.remove());
    }

    function createMaxShadow(pane) {
      removeMaxShadow();
      const shadow = document.createElement('div');
      shadow.className = 'pane-max-shadow';
      shadow.style.left = pane.style.left;
      shadow.style.top = pane.style.top;
      shadow.style.width = pane.offsetWidth + 'px';
      shadow.style.height = pane.offsetHeight + 'px';
      const paneZ = parseInt(pane.style.zIndex, 10) || 0;
      shadow.style.zIndex = String(Math.max(0, paneZ - 1));
      document.getElementById('canvas').appendChild(shadow);
    }

    function setPaneMaxButtonState(pane, active) {
      const btn = pane?.querySelector('.maximize-pane-btn');
      if (!btn) return;
      btn.classList.toggle('active', active);
      btn.title = active ? '退出最大化' : '最大化';
      btn.textContent = active ? '🗗' : '□';
    }

    function enterMaxMode(id) {
      const pane = document.querySelector(`.json-pane[data-pane-id="${id}"]`);
      if (!pane) return;
      if (pane.classList.contains('pane-minimized')) {
        pane.classList.remove('pane-minimized');
        scheduleSave(pane);
      }
      if (maximizedPaneId && maximizedPaneId !== id) {
        const prevPane = document.querySelector(`.json-pane[data-pane-id="${maximizedPaneId}"]`);
        if (prevPane) {
          prevPane.classList.remove('pane-maximized');
          setPaneMaxButtonState(prevPane, false);
        }
      }
      createMaxShadow(pane);
      pane.classList.add('pane-maximized');
      setPaneMaxButtonState(pane, true);
      maximizedPaneId = id;
      JsonVDrag.bringToFront(pane);
      setActiveChip(id);
      refreshIndex();
    }

    function exitMaxMode() {
      if (!maximizedPaneId) return;
      const pane = document.querySelector(`.json-pane[data-pane-id="${maximizedPaneId}"]`);
      if (pane) {
        pane.classList.remove('pane-maximized');
        setPaneMaxButtonState(pane, false);
      }
      maximizedPaneId = null;
      removeMaxShadow();
      refreshIndex();
    }

    function toggleMaxMode(id) {
      if (maximizedPaneId === id) {
        exitMaxMode();
      } else {
        enterMaxMode(id);
      }
    }

    function buildPaneSnapshot(pane) {
      const paneContent = pane.querySelector('.pane-content');
      return {
        id: pane.dataset.paneId,
        title: pane.querySelector('.pane-title-input').value,
        content: pane.querySelector('.editor-textarea').value,
        createdAt: parseInt(pane.dataset.createdAt, 10) || Date.now(),
        updatedAt: parseInt(pane.dataset.updatedAt, 10) || Date.now(),
        hlMode: pane.dataset.hlMode || '',
        minimized: pane.classList.contains('pane-minimized'),
        wordWrap: !paneContent.classList.contains('pane-nowrap'),
        height: parseInt(paneContent.style.height, 10) || paneContent.offsetHeight || DEFAULT_HEIGHT,
        width: parseInt(pane.style.width, 10) || pane.offsetWidth || DEFAULT_WIDTH,
        x: parseInt(pane.style.left, 10) || 0,
        y: parseInt(pane.style.top, 10) || 0,
        zIndex: parseInt(pane.style.zIndex, 10) || 0,
      };
    }

    function downloadJson(filename, payload) {
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function closeDataFabMenu() {
      document.getElementById('dataFabMenu').classList.remove('open');
    }

    function openDataFabMenu() {
      document.getElementById('dataFabMenu').classList.add('open');
    }

    function parseImportPayload(raw) {
      if (!raw || typeof raw !== 'object') return null;
      if (raw.app !== 'text-cards' || raw.version !== EXPORT_VERSION || !Array.isArray(raw.panes)) {
        return null;
      }
      return raw.panes
        .filter(p => p && typeof p === 'object' && typeof p.title === 'string' && typeof p.content === 'string')
        .map((p, idx) => ({
          id: typeof p.id === 'string' && p.id ? p.id : `pane-import-${Date.now()}-${idx}`,
          title: p.title,
          content: p.content,
          createdAt: Number.isFinite(p.createdAt) ? p.createdAt : Date.now(),
          updatedAt: Number.isFinite(p.updatedAt) ? p.updatedAt : (Number.isFinite(p.createdAt) ? p.createdAt : Date.now()),
          hlMode: typeof p.hlMode === 'string' ? p.hlMode : '',
          minimized: !!p.minimized,
          wordWrap: p.wordWrap !== false,
          height: Number.isFinite(p.height) ? p.height : DEFAULT_HEIGHT,
          width: Number.isFinite(p.width) ? p.width : DEFAULT_WIDTH,
          x: Number.isFinite(p.x) ? p.x : 40 + (idx * 20),
          y: Number.isFinite(p.y) ? p.y : 40 + (idx * 20),
          zIndex: Number.isFinite(p.zIndex) ? p.zIndex : idx + 1,
        }));
    }

    async function exportDataToJson() {
      const panes = Array.from(document.querySelectorAll('.json-pane')).map(buildPaneSnapshot);
      const payload = {
        app: 'text-cards',
        version: EXPORT_VERSION,
        exportedAt: Date.now(),
        panes,
      };
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}${String(now.getDate()).padStart(2, '0')}-${String(now.getHours()).padStart(2, '0')}${String(now.getMinutes()).padStart(2, '0')}${String(now.getSeconds()).padStart(2, '0')}`;
      downloadJson(`text-cards-backup-${stamp}.json`, payload);
      showToast(`已导出 ${panes.length} 个卡片`, 'success');
    }

    async function replaceAllPanes(importedPanes) {
      exitMaxMode();
      const existingPanes = Array.from(document.querySelectorAll('.json-pane'));
      for (const pane of existingPanes) {
        await JsonVStorage.removePane(pane.dataset.paneId);
        pane.remove();
      }
      Object.keys(paneSelections).forEach((k) => { delete paneSelections[k]; });

      importedPanes
        .sort((a, b) => (a.zIndex || 0) - (b.zIndex || 0))
        .forEach((paneData) => {
          JsonVDrag.setBaseZ(paneData.zIndex || 0);
          createPane(paneData);
        });

      if (!importedPanes.length) createPane();
      refreshIndex();
    }

    async function importDataFromFile(file) {
      if (!file) return;
      const text = await file.text();
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch {
        showToast('导入失败：不是有效 JSON', 'error');
        return;
      }
      const panes = parseImportPayload(parsed);
      if (!panes) {
        showToast('导入失败：无法识别的 text-cards 数据格式', 'error');
        return;
      }
      const ok = window.confirm(`将用导入数据覆盖当前画布（${panes.length} 个卡片），是否继续？`);
      if (!ok) return;
      await replaceAllPanes(panes);
      showToast(`导入成功：${panes.length} 个卡片`, 'success');
    }

    function refreshHighlight(pane) {
      const textarea = pane.querySelector('.editor-textarea');
      const view = pane.querySelector('.highlight-view');
      const mode = pane.dataset.hlMode || 'json';
      if (mode === 'shell') {
        view.innerHTML = JsonVHighlight.highlightShell(textarea.value);
      } else if (mode === 'markdown') {
        view.innerHTML = JsonVHighlight.highlightMarkdown(textarea.value);
      } else {
        view.innerHTML = JsonVHighlight.scanAndHighlight(textarea.value);
      }
    }

    function scheduleSave(pane) {
      const id = pane.dataset.paneId;
      const paneContent = pane.querySelector('.pane-content');
      const isMaximized = pane.classList.contains('pane-maximized');
      const now = Date.now();
      pane.dataset.updatedAt = String(now);
      const timeMeta = pane.querySelector('.pane-created-at');
      if (timeMeta) {
        const createdAtText = formatTimestamp(parseInt(pane.dataset.createdAt, 10) || now);
        timeMeta.textContent = `C:${createdAtText} · U:${formatTimestamp(now)}`;
      }
      const savedHeight = isMaximized
        ? (parseInt(paneContent.style.height, 10) || DEFAULT_HEIGHT)
        : paneContent.offsetHeight;
      const savedWidth = isMaximized
        ? (parseInt(pane.style.width, 10) || DEFAULT_WIDTH)
        : pane.offsetWidth;
      JsonVStorage.savePane(id, {
        title:       pane.querySelector('.pane-title-input').value,
        content:     pane.querySelector('.editor-textarea').value,
        createdAt:   parseInt(pane.dataset.createdAt, 10) || Date.now(),
        updatedAt:   now,
        hlMode:      pane.dataset.hlMode || '',
        minimized:   pane.classList.contains('pane-minimized'),
        wordWrap:    !paneContent.classList.contains('pane-nowrap'),
        height:      savedHeight,
        width:       savedWidth,
        x:           parseInt(pane.style.left, 10) || 0,
        y:           parseInt(pane.style.top, 10)  || 0,
        zIndex:      parseInt(pane.style.zIndex, 10) || 0,
      });
    }

    // ── 顶部索引 ──
    function refreshIndex() {
      const container = document.getElementById('paneIndex');
      const panes = document.querySelectorAll('.json-pane');
      container.innerHTML = '';
      panes.forEach(p => {
        const id = p.dataset.paneId;
        const title = p.querySelector('.pane-title-input').value || 'Pane';
        const isMin = p.classList.contains('pane-minimized');
        const isMax = id === maximizedPaneId;
        const chip = document.createElement('span');
        chip.className = 'idx-chip' + (isMin ? ' minimized' : '') + (isMax ? ' maximized' : '');
        chip.dataset.paneId = id;
        chip.textContent = title;
        chip.title = isMin ? `${title} (最小化)` : title;
        chip.addEventListener('click', () => focusPane(id));
        container.appendChild(chip);
      });
    }

    function setActiveChip(id) {
      document.querySelectorAll('.idx-chip').forEach(c => {
        c.classList.toggle('active', c.dataset.paneId === id);
      });
    }

    function focusPane(id) {
      const pane = document.querySelector(`.json-pane[data-pane-id="${id}"]`);
      if (!pane) return;
      if (maximizedPaneId) {
        if (maximizedPaneId !== id) {
          enterMaxMode(id);
        } else {
          setActiveChip(id);
        }
        return;
      }
      if (pane.classList.contains('pane-minimized')) {
        pane.classList.remove('pane-minimized');
        scheduleSave(pane);
        refreshIndex();
      }
      JsonVDrag.bringToFront(pane);
      setActiveChip(id);
      // 滚动画布使窗格居中可见
      const vp = document.getElementById('canvasViewport');
      const px = parseInt(pane.style.left, 10) || 0;
      const py = parseInt(pane.style.top, 10) || 0;
      vp.scrollTo({
        left: px - (vp.clientWidth - pane.offsetWidth) / 2,
        top:  py - (vp.clientHeight - pane.offsetHeight) / 2,
        behavior: 'smooth',
      });
      scheduleSave(pane);
    }

    // ── 全局监听 ──
    function setupGlobalListeners() {
      document.getElementById('addPaneBtn').addEventListener('click', () => createPane());

      const fabBtn = document.getElementById('dataFabBtn');
      const fabMenu = document.getElementById('dataFabMenu');
      const exportBtn = document.getElementById('exportDataBtn');
      const importBtn = document.getElementById('importDataBtn');
      const importInput = document.getElementById('importFileInput');

      fabBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (fabMenu.classList.contains('open')) {
          closeDataFabMenu();
        } else {
          openDataFabMenu();
        }
      });

      exportBtn.addEventListener('click', async () => {
        closeDataFabMenu();
        await exportDataToJson();
      });

      importBtn.addEventListener('click', () => {
        closeDataFabMenu();
        importInput.value = '';
        importInput.click();
      });

      importInput.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        await importDataFromFile(file);
      });

      document.addEventListener('click', (e) => {
        if (!document.getElementById('dataFabWrap').contains(e.target)) {
          closeDataFabMenu();
        }
      });
    }

    // ── Toast ──
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const msg = document.getElementById('toastMsg');
      msg.textContent = message;
      const colors = { success: '#22c55e', error: '#ef4444', info: '#e2e8f0' };
      const borders = { success: '#22c55e', error: '#ef4444', info: '#334155' };
      toast.style.borderColor = borders[type] || borders.info;
      msg.style.color = colors[type] || colors.info;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }
  </script>
