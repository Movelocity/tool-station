<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>火箭发射概率模拟器</title>
  <script src="/lib/tailwind.js"></script>
  <style>
    /* 自定义一些过渡效果，让灯的闪烁更自然 */
    .light-cell {
      transition: all 0.1s ease-in-out;
    }

    /* 亮绿色 */
    .light-on-green {
      background-color: #22c55e;
      /* green-500 */
      box-shadow: 0 0 10px #22c55e;
      transform: scale(1.1);
    }

    /* 亮红色 */
    .light-on-red {
      background-color: #ef4444;
      /* red-500 */
      box-shadow: 0 0 10px #ef4444;
      transform: scale(1.1);
    }

    /* 暗绿色 (成功区) */
    .light-dim-green {
      background-color: #14532d;
      /* green-900 */
    }

    /* 暗红色 (失败区) */
    .light-dim-red {
      background-color: #531616;
      /* red-900 */
    }

    /* 等待/灰态 */
    .light-off {
      background-color: #374151;
      /* gray-700 */
    }

    /* 按钮文字立体描边：上方细、下方粗，模拟光照从上方的立体感 */
    .btn-text-stroke {
      -webkit-text-stroke: 0.5px black;
      paint-order: stroke fill;
      text-shadow:
        /* 上方细描边（受光面） */
        0 -1px 0 black,
        /* 左右轻微描边 */
        -1px 0 0 black,
        1px 0 0 black,
        /* 下方粗描边（背光面，多层叠出厚度） */
        0 1px 0 black,
        0 2px 0 black,
        0 3px 0 black;
    }
  </style>
</head>

<body class="bg-gray-900 text-white font-sans min-h-screen flex flex-col items-center justify-center p-4">

  <!-- 主容器 -->
  <div class="w-full max-w-4xl bg-blue-950/70 border border-gray-800 rounded-xl shadow-2xl p-6 relative overflow-hidden">

    <!-- 顶部标题与总概率 -->
    <div class="text-center border-b border-gray-800 pb-6">
      <h1 class="text-3xl font-bold text-blue-400 tracking-wider mb-2 uppercase"
        style="text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);">
        发射台
      </h1>

      <div id="status-msg" class="mt-4 h-8 text-xl font-bold text-yellow-400"></div>
    </div>

    <!-- 六层概率菜单 -->
    <div id="layers-container" class="space-y-3">
      <!-- 动态生成层 -->
    </div>

    <!-- 底部启动按钮 -->
    <div class="mt-6 flex justify-between items-center">
      <div class="bg-gray-900/80 px-16 py-1 rounded-lg flex items-center gap-4">
        <span class="text-gray-400 text-sm uppercase">成功率</span>
        <div id="total-prob" class="text-3xl font-mono font-bold text-white">0.00%</div>
      </div>
      <button id="start-btn" onclick="startSimulation()"
        class="btn-text-stroke bg-green-600 hover:bg-green-500 text-white text-xl font-bold py-4 px-12 rounded-lg transition-all transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
        点 火 发 射
      </button>
    </div>

    <!-- ================= 新增：概率统计分析面板 ================= -->
    <div class="mt-8 border-t border-gray-800 pt-4">
      <!-- 低调的 Trigger -->
      <div class="flex justify-center">
        <button id="stats-toggle" class="text-gray-600 hover:text-gray-400 text-xs uppercase tracking-widest flex items-center gap-1 transition-colors duration-300">
          <span>Probability Analysis</span>
          <svg id="stats-chevron" class="w-3 h-3 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </button>
      </div>

      <!-- 折叠内容 -->
      <div id="stats-panel" class="hidden mt-3 animate-fade-in">
        

        <!-- 统计网格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          
          <!-- 左侧：综合统计 -->
          <div class="space-y-2 bg-gray-900/30 p-3 rounded-lg border border-gray-800">
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
              <span class="text-gray-500">单次发射成功率</span>
              <span id="stat-overall" class="font-mono text-green-400 font-bold">--%</span>
            </div>
            <div class="flex justify-between items-center border-b border-gray-800 pb-2">
              <span class="text-gray-500">期望尝试次数，即平均需要尝试多少次才能成功</span>
              <span id="stat-expected" class="font-mono text-blue-400 font-bold">--</span>
            </div>

            <!-- 输入区域 -->
            <div class="flex items-center justify-between gap-3 mb-4 text-sm text-gray-400 rounded-lg border border-gray-800">
              <label>目标尝试次数 (n):</label>
              <input type="number" id="stats-n-input" value="10" min="1" class="bg-gray-800 border border-gray-700 rounded px-2 py-1 w-20 text-center text-white focus:outline-none focus:border-blue-500 font-mono">
            </div>
            <!-- 动态概率计算 -->
            <div class="bg-gray-800/40 p-2 rounded mt-2">
              <div class="flex justify-between items-center mb-1">
                <span class="text-gray-400 text-xs">第 n 次才成功 (Geometric)</span>
                <span id="stat-geo" class="font-mono text-yellow-400 text-xs">--%</span>
              </div>
              <div class="flex justify-between items-center">
                <span class="text-gray-400 text-xs">n 次内成功至少一次 (Cumulative)</span>
                <span id="stat-cum" class="font-mono text-purple-400 text-xs">--%</span>
              </div>
            </div>
          </div>

          <!-- 右侧：层级明细 -->
          <div class="bg-gray-900/30 p-3 rounded-lg border border-gray-800 flex flex-col">
            <div class="text-gray-500 mb-2 text-xs uppercase tracking-wider border-b border-gray-800 pb-1">各级别成功率</div>
            <div id="stat-layers" class="grid grid-cols-2 gap-x-4 gap-y-1 font-mono text-xs text-gray-300">
              <!-- 由 JS 填充 -->
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- ================= 统计面板结束 ================= -->

  </div>

  <script>
    // 配置
    const LAYER_COUNT = 6;
    const GRID_COUNT = 10; // 每层10个格子

    // 初始状态：每层 50% 概率
    let layersData = Array(LAYER_COUNT).fill(0.5);

    // 动画状态锁
    let isRunning = false;

    // 初始化渲染
    function init() {
      renderLayers();
      updateTotalProb();
      initStats(); // 初始化统计面板
    }

    // 更新综合概率显示
    function updateTotalProb() {
      // 总概率 = P1 * P2 * P3 * P4 * P5 * P6
      let total = layersData.reduce((acc, val) => acc * val, 1);
      document.getElementById('total-prob').innerText = (total * 100).toFixed(2) + '%';
      // 同时更新统计面板
      updateStatsPanel();
    }

    // ================= 统计面板逻辑 =================
    function initStats() {
      // 绑定折叠按钮
      const toggleBtn = document.getElementById('stats-toggle');
      const panel = document.getElementById('stats-panel');
      const chevron = document.getElementById('stats-chevron');

      toggleBtn.addEventListener('click', () => {
        panel.classList.toggle('hidden');
        // 简单的旋转箭头效果
        if (panel.classList.contains('hidden')) {
          chevron.style.transform = 'rotate(0deg)';
        } else {
          chevron.style.transform = 'rotate(180deg)';
        }
      });

      // 绑定输入框
      const nInput = document.getElementById('stats-n-input');
      nInput.addEventListener('input', updateStatsPanel);
      
      // 初始渲染一次
      updateStatsPanel();
    }

    function updateStatsPanel() {
      const pTotal = layersData.reduce((acc, val) => acc * val, 1);
      
      // 更新总体成功率
      document.getElementById('stat-overall').innerText = (pTotal * 100).toFixed(2) + '%';

      // 更新期望值 (1 / p)
      const expected = pTotal > 0 ? (1 / pTotal).toFixed(2) : '∞';
      document.getElementById('stat-expected').innerText = expected;

      // 获取用户输入的 n
      let n = parseInt(document.getElementById('stats-n-input').value);
      if (isNaN(n) || n < 1) n = 1;

      // 更新 n 的显示引用
      document.getElementById('stat-geo').previousElementSibling.innerHTML = `第 ${n} 次才成功 (Geometric)`;
      document.getElementById('stat-cum').previousElementSibling.innerHTML = `${n} 次内成功至少一次 (Cumulative)`;

      // 计算几何分布 (恰好第 n 次成功)
      // P(X = n) = (1-p)^(n-1) * p
      let geoProb = Math.pow(1 - pTotal, n - 1) * pTotal;
      document.getElementById('stat-geo').innerText = (geoProb * 100).toFixed(2) + '%';

      // 计算累积分布 (n 次内至少成功一次)
      // P(X <= n) = 1 - (1-p)^n
      let cumProb = 1 - Math.pow(1 - pTotal, n);
      document.getElementById('stat-cum').innerText = (cumProb * 100).toFixed(2) + '%';

      // 渲染层级明细
      const layersContainer = document.getElementById('stat-layers');
      layersContainer.innerHTML = '';
      // 改成到该层才成功的概率，即前面的层都要成功
      // layersData.forEach((prob, idx) => {
      //   const div = document.createElement('div');
      //   div.className = 'flex justify-between';
      //   div.innerHTML = `<span>层级 ${idx + 1}</span> <span class="text-blue-300">${(prob * 100).toFixed(0)}%</span>`;
      //   layersContainer.appendChild(div);
      // });
      let prob = 1;
      for (let i = 0; i < layersData.length; i++) {
        prob *= layersData[i];
        const div = document.createElement('div');
        div.className = 'flex justify-between';
        div.innerHTML = `<span>层级 ${i + 1}</span> <span class="text-blue-300">${(prob * 100).toFixed(2)}%</span>`;
        layersContainer.appendChild(div);
      }
    }
    // =================================================

    // 渲染层
    function renderLayers() {
      const container = document.getElementById('layers-container');
      container.innerHTML = '';

      layersData.forEach((prob, index) => {
        const layerDiv = document.createElement('div');
        layerDiv.className = 'flex items-center justify-between bg-gray-900 p-3 rounded-xl';

        // 层级标签
        const label = document.createElement('div');
        label.className = 'w-16 text-right mr-4 font-bold text-gray-400';
        label.innerText = `层级 ${index + 1}`;

        // 灯格容器
        const gridContainer = document.createElement('div');
        gridContainer.className = 'flex-grow grid grid-cols-10 gap-1 mx-2';
        gridContainer.id = `layer-${index}-grid`;

        // 生成10个格子
        for (let i = 0; i < GRID_COUNT; i++) {
          const cell = document.createElement('div');
          cell.id = `layer-${index}-cell-${i}`;
          cell.className = 'h-8 w-full rounded-md light-cell light-off'; // 初始全灰，等待JS填充颜色
          gridContainer.appendChild(cell);
        }

        // 控制按钮区域
        const controls = document.createElement('div');
        controls.className = 'flex items-center space-x-1 ml-4';

        // 减号按钮
        const btnMinus = document.createElement('button');
        btnMinus.innerText = '-';
        btnMinus.className = 'w-8 h-8 bg-gray-700 hover:bg-gray-600 text-white rounded font-bold text-lg flex items-center justify-center transition-colors';
        btnMinus.onclick = () => adjustProb(index, -0.1);

        // 当前概率显示
        const probDisplay = document.createElement('div');
        probDisplay.className = 'prob-text-display w-12 text-center text-sm font-bold text-green-400';
        probDisplay.innerText = prob.toFixed(1);

        // 加号按钮
        const btnPlus = document.createElement('button');
        btnPlus.innerText = '+';
        btnPlus.className = 'w-8 h-8 bg-gray-700 hover:bg-gray-600 text-white rounded font-bold text-lg flex items-center justify-center transition-colors';
        btnPlus.onclick = () => adjustProb(index, 0.1);

        controls.appendChild(btnMinus);
        controls.appendChild(probDisplay);
        controls.appendChild(btnPlus);

        layerDiv.appendChild(label);
        layerDiv.appendChild(gridContainer);
        layerDiv.appendChild(controls);
        container.appendChild(layerDiv);

        // 渲染该层的静态颜色（成功后保持绿，失败后保持红，平时显示暗色）
        updateLayerVisuals(index, prob);
      });
    }

    // 调整概率
    function adjustProb(layerIndex, delta) {
      if (isRunning) return; // 运行中禁止修改

      let newProb = layersData[layerIndex] + delta;
      // 限制范围 0.1 ~ 1.0，step 0.1
      if (newProb < 0.1) newProb = 0.1;
      if (newProb > 1.0) newProb = 1.0;

      // 修正浮点数精度问题 (e.g. 0.30000000004)
      newProb = Math.round(newProb * 10) / 10;

      layersData[layerIndex] = newProb;

      // 重新渲染该层的静态颜色
      updateLayerVisuals(layerIndex, newProb);

      // 更新文本显示
      const controls = document.querySelectorAll('#layers-container > div')[layerIndex];
      controls.querySelector('.prob-text-display').innerText = newProb.toFixed(1);

      updateTotalProb();
    }

    // 更新每层格子的颜色（基础状态）
    function updateLayerVisuals(layerIndex, prob, specialIndex = -1, state = 'static') {
      // 成功的格子数 (0-10)
      const successCount = Math.round(prob * GRID_COUNT);

      for (let i = 0; i < GRID_COUNT; i++) {
        const cell = document.getElementById(`layer-${layerIndex}-cell-${i}`);

        // 清除所有特殊状态类
        cell.classList.remove('light-on-green', 'light-on-red', 'light-dim-green', 'light-dim-red', 'light-off');

        const isLeftSide = i < successCount;

        if (state === 'static') {
          // 静态模式下：左边是暗绿，右边是暗红
          if (isLeftSide) {
            cell.classList.add('light-dim-green');
          } else {
            cell.classList.add('light-dim-red');
          }
        } else if (state === 'running') {
          // 动画模式：除了当前跑马灯位置是亮的，其他恢复静态
          if (i === specialIndex) {
            // 不管左右，亮起来
            if (isLeftSide) cell.classList.add('light-on-green');
            else cell.classList.add('light-on-red');
          } else {
            // 恢复暗色
            if (isLeftSide) cell.classList.add('light-dim-green');
            else cell.classList.add('light-dim-red');
          }
        } else if (state === 'finished') {
          // 结束模式
          if (i === specialIndex) {
            if (isLeftSide) cell.classList.add('light-on-green');
            else cell.classList.add('light-on-red');
          } else {
            if (isLeftSide) cell.classList.add('light-dim-green');
            else cell.classList.add('light-dim-red');
          }
        }
      }
    }

    // 核心动画逻辑
    async function startSimulation() {
      if (isRunning) return;
      isRunning = true;

      const startBtn = document.getElementById('start-btn');
      const statusMsg = document.getElementById('status-msg');

      startBtn.disabled = true;
      statusMsg.innerText = "系统自检中...";
      statusMsg.className = "mt-4 h-8 text-xl font-bold text-blue-400 animate-pulse";

      // 启动时清除之前亮起的灯，所有层恢复为静态暗色
      for (let i = 0; i < LAYER_COUNT; i++) {
        updateLayerVisuals(i, layersData[i], -1, 'static');
      }

      await new Promise(r => setTimeout(r, 500));

      let failed = false;

      for (let i = 0; i < LAYER_COUNT; i++) {
        statusMsg.innerText = `检测引擎层级 ${i + 1}...`;

        const prob = layersData[i];
        const successCount = Math.round(prob * GRID_COUNT);

        // 决定结果：根据概率随机一个数
        const randomVal = Math.random(); 
        const isLayerSuccess = randomVal < prob;

        // 计算停下的格子索引
        let finalIndex;
        if (isLayerSuccess) {
          finalIndex = Math.floor(Math.random() * successCount);
        } else {
          finalIndex = successCount + Math.floor(Math.random() * (GRID_COUNT - successCount));
        }

        // 跑马灯动画
        await runMarquee(i, finalIndex);

        // 检查结果
        if (!isLayerSuccess) {
          failed = true;
          statusMsg.innerText = `层级 ${i + 1} 点火失败！`;
          statusMsg.className = "mt-4 h-8 text-2xl font-bold text-red-500";
          // 标记失败格子
          const cell = document.getElementById(`layer-${i}-cell-${finalIndex}`);
          cell.classList.remove('light-on-red'); 
          void cell.offsetWidth; 
          cell.classList.add('light-on-red');
          break;
        } else {
          // 成功
          const cell = document.getElementById(`layer-${i}-cell-${finalIndex}`);
          cell.classList.remove('light-on-green');
          void cell.offsetWidth;
          cell.classList.add('light-on-green');
          await new Promise(r => setTimeout(r, 300));
        }
      }

      if (!failed) {
        statusMsg.innerText = "🚀 火箭发射成功！冲鸭！";
        statusMsg.className = "mt-4 h-8 text-2xl font-bold text-green-400 animate-bounce";
      }

      isRunning = false;
      startBtn.disabled = false;
    }

    // 跑马灯动画函数
    function runMarquee(layerIndex, targetIndex) {
      return new Promise(resolve => {
        let step = 0;
        // 动画步数：先跑几圈模糊视觉，然后停在目标
        // 简单逻辑：跑 15 次 + 目标位置
        const totalSteps = 15 + targetIndex; 

        const simpleTimer = setInterval(() => {
          const idx = step % GRID_COUNT;
          updateLayerVisuals(layerIndex, layersData[layerIndex], idx, 'running');

          step++;

          if (step > 15 && idx === targetIndex) {
            clearInterval(simpleTimer);
            resolve();
          }
        }, 60); 
      });
    }

    // 启动
    init();

  </script>
</body>

</html>
